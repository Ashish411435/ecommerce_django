{% extends "base.html" %} 
{% load static %} 

{% block content %}
<!-- ========================= SECTION CONTENT ========================= -->
<section class="section-conten padding-y" style="min-height: 84vh">
  <!-- ============================ COMPONENT LOGIN   ================================= -->
  <div class="card mx-auto" style="max-width: 380px; margin-top: 60px">
      <div class="card-body">
        {% include 'includes/alerts.html' %}
        <h4 class="card-title mb-4">Reset Your Password</h4>
        <form action="{% url 'resetPassword' %}" method="POST">
          {% csrf_token %}
          <!-- form-group// -->
          <div class="form-group">
            <input type="password" class="form-control" placeholder="Enter New Password" name="password" required />
          </div>
          <div class="form-group">
            <input type="password" class="form-control" placeholder="Confirm New Password" name="confirm_password" required />
          </div>
          <!-- form-group// -->
          <!-- form-group form-check .// -->
          <div class="form-group">
            <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
          </div>
          <!-- form-group// -->
        </form>
      </div>
    <!-- card-body.// -->
  </div>
  <!-- card .// -->

  <p class="text-center mt-4">Don't have account? <a href="{% url 'register' %}">Sign up</a></p>
  <br /><br />
  <!-- ============================ COMPONENT LOGIN  END.// ================================= -->
</section>
<!-- ========================= SECTION CONTENT END// ========================= -->
{% endblock content %}
