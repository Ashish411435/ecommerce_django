{% extends "base.html" %}
{% load static %}

{% block content %}
<!-- ========================= SECTION CONTENT ========================= -->
<section class="section-conten padding-y bg">

	<div class="container">
		{% include 'includes/alerts.html' %}
		<div class="row">
			{% include 'includes/dashboard-sidebar.html' %}
			<main class="col-md-9">
				<article class="card">
					<header class="card-header">
						<strong class="d-inline-block mr-3">Welcome {{ user.full_name }}</strong>
					</header>
					<div class="card-body">
						<div class="row">
							<div class="col-md-6">
								<div class="card text-center">
									<div class="card-body">
										<div class="card-title">Total Orders</div>
										<div class="h4">
											{{ orders_count }}
										</div>
										<a href="{% url 'my_orders' %}">View Orders</a>
									</div>
								</div>
							</div>
							<div class="col-md-6">
								<div class="card text-center">
									<div class="card-body">
										<img src="https://www.w3schools.com/howto/img_avatar.png"
											alt="User Profile Picture" width="60" height="60" class="rounded-circle">
										<p class="mb-0">{{ user.email }}</p>
										<p class="mb-0">{{ user.phone_number }}</p>
									</div>
								</div>
							</div>
						</div> <!-- row.// -->
					</div> <!-- card-body .// -->
				</article> <!-- order-group.// -->
			</main>
		</div> <!-- row.// -->
	</div>


</section>
<!-- ========================= SECTION CONTENT END// ========================= -->
{% endblock content %}
